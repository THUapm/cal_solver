<!--
  assets/head.html — MathSolver 头部注入
  - Inter / JetBrains Mono 字体（Google Fonts）
  - 主题切换脚本
  - 备注: LaTeX 渲染已迁移到 Python 端 (latex_to_html → MathML), 浏览器原生支持
  - MutationObserver 保留作为未来扩展点
-->

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- 主题切换：document.documentElement.dataset.theme = 'light' | 'dark' -->
<script>
window.toggleTheme = function() {
  const html = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  const next = isDark ? 'light' : 'dark';
  html.dataset.theme = next;
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = next === 'dark' ? '\u2600' : '\uD83C\uDF19';
  try { localStorage.setItem('mathsolver-theme', next); } catch (e) {}
};
try {
  const saved = localStorage.getItem('mathsolver-theme');
  if (saved === 'dark') {
    document.documentElement.dataset.theme = 'dark';
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = '\u2600';
    });
  }
} catch (e) {}

// 复制 OCR 结果到剪贴板（兼容 gr.HTML 输出）
window.copyOcrToClipboard = async function() {
  let textarea = document.querySelector('textarea[aria-label*="解答内容"]')
                || document.querySelector('textarea');
  if (!textarea) {
    console.warn('OCR textbox not found');
    return;
  }
  const text = textarea.value || '';
  const btn = document.querySelector('.copy-latex-btn');
  if (!text.trim()) {
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '\u26A0 文本框为空';
      setTimeout(() => { btn.textContent = orig; }, 1200);
    }
    return;
  }
  try {
    await navigator.clipboard.writeText(text);
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (_) {}
    document.body.removeChild(ta);
  }
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = '\u2713 已复制';
    setTimeout(() => { btn.textContent = orig; }, 1200);
  }
};
</script>
